<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkShort — Аналитика</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background: #0b1020; color: #eaeefc; margin: 0; padding: 0; }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 16px; }
    .card { background: #141c2e; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); }
    .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    label { font-size: 0.9rem; color: #a6b0d4; }
    input[type="text"] { padding: 12px 14px; border-radius: 8px; border: 1px solid #324056; background: #0b1220; color: #eaf0ff; min-width: 260px; }
    button { padding: 12px 16px; border-radius: 8px; border: none; background: #6366f1; color: white; cursor: pointer; font-weight: 600; }
    button.secondary { background: #334155; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .section { border-radius: 8px; padding: 12px; background: #0f1a31; border:1px solid rgba(255,255,255,0.08); }
    .section h3 { margin: 6px 0 12px; font-size: 1.1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.9rem; }
    th { text-align: left; color: #cbd5e1; }
    .bar { background: #1e2a4a; height: 12px; border-radius: 6px; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, #4f46e5, #22c55e); }
    .item { display: flex; align-items: center; gap: 12px; margin: 6px 0; }
    .item-label { width: 120px; color: #cbd5e1; font-variant-numeric: tabular-nums; }
    .legend { display: inline-block; margin-left: 6px; font-size: 0.85rem; color: #9fb2d9; }
    .hidden { display: none; }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="row" style="justify-content: space-between; align-items: center;">
        <h1>Аналитика сокращённой ссылки</h1>
        <a href="/">К созданию сокращённых ссылок</a>
      </div>
      <div class="row" style="gap:12px; align-items:center; margin-top:6px;">
        <div>
          <label for="shortKey">Код короткой ссылки</label><br/>
          <input type="text" id="shortKey" placeholder="Введите код, например abc123" />
        </div>
        <button id="loadBtn">Показать аналитику</button>
      </div>
    </div>

    <div class="grid">
      <div class="section" id="summarySection" aria-label="summary" class="hidden">
        <h3>Итого</h3>
        <div id="summaryContent"></div>
      </div>
      <div class="section" id="byDaySection" aria-label="by-day">
        <h3>По дням</h3>
        <div id="byDayChart"></div>
      </div>
      <div class="section" id="byMonthSection" aria-label="by-month">
        <h3>По месяцам</h3>
        <div id="byMonthChart"></div>
      </div>
    </div>

    <div class="card" id="recentClicksCard" style="display:none;">
      <h3 style="margin:0 0 8px;">Последние клики</h3>
      <table id="recentClicksTable">
        <thead>
          <tr><th>Время</th><th>IP</th><th>UA</th><th>Referer</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const shortKeyInput = document.getElementById('shortKey');
    const loadBtn = document.getElementById('loadBtn');
    const summarySection = document.getElementById('summarySection');
    const summaryContent = document.getElementById('summaryContent');
    const byDayChart = document.getElementById('byDayChart');
    const byMonthChart = document.getElementById('byMonthChart');
    const recentClicksCard = document.getElementById('recentClicksCard');
    const recentClicksTableBody = document.querySelector('#recentClicksTable tbody');

    function normalizeKey(input) {
      if (!input) return '';
      // If it's a URL, extract the last segment as the short key
      try {
        const url = new URL(input);
        const paths = url.pathname.split('/').filter(p => p.length > 0);
        // If path contains /s/<key>/..., take last segment
        return paths.length ? paths[paths.length - 1] : input;
      } catch {
        // Not a URL
        // If input contains '/', take last segment
        const parts = input.split('/').filter(p => p.length > 0);
        return parts.length ? parts[parts.length - 1] : input;
      }
    }

    async function renderAnalytics(shortKeyRaw) {
      const slug = normalizeKey(shortKeyRaw);
      if (!slug) return;
      try {
        const resp = await fetch(`/s/${encodeURIComponent(slug)}/analytics`);
        if (!resp.ok) {
          alert('Не удалось загрузить аналитику: ' + (await resp.text()));
          return;
        }
        const data = await resp.json();
        // Summary
        summarySection.style.display = 'block';
        const total = data.total_clicks ?? data.TotalClicks ?? 0;
        summaryContent.innerHTML = `
          <div>Код: <strong>${data.short_key ?? slug}</strong></div>
          <div>Всего кликов: <strong>${total}</strong></div>
        `;
        // Recent clicks
        if (data.recent_clicks && data.recent_clicks.length > 0) {
          recentClicksCard.style.display = 'block';
          recentClicksTableBody.innerHTML = '';
          data.recent_clicks.forEach(c => {
            const tr = document.createElement('tr');
            const tdTime = document.createElement('td');
            const tdIP = document.createElement('td');
            const tdUA = document.createElement('td');
            const tdReferer = document.createElement('td');
            const ts = new Date(c.timestamp).toLocaleString();
            tdTime.textContent = ts;
            tdIP.textContent = c.ip || '';
            tdUA.textContent = c.user_agent || '';
            tdReferer.textContent = c.referer || '';
            tr.appendChild(tdTime);
            tr.appendChild(tdIP);
            tr.appendChild(tdUA);
            tr.appendChild(tdReferer);
            recentClicksTableBody.appendChild(tr);
          });
        } else {
          recentClicksCard.style.display = 'none';
        }
        // By Day
        renderBars(byDayChart, data.by_day || data.ByDay || {});
        // By Month
        renderBars(byMonthChart, data.by_month || data.ByMonth || {});
      } catch (err) {
        console.error(err);
        alert('Ошибка загрузки аналитики');
      }
    }

    function renderBars(container, map) {
      container.innerHTML = '';
      const keys = Object.keys(map || {});
      const values = keys.map(k => Number(map[k] || 0));
      const max = Math.max(1, ...values);
      keys.forEach((k, idx) => {
        const v = values[idx];
        const div = document.createElement('div');
        div.className = 'item';
        const label = document.createElement('div');
        label.className = 'item-label';
        label.textContent = k;
        const barWrap = document.createElement('div');
        barWrap.style.flex = '1';
        barWrap.className = 'bar';
        const bar = document.createElement('span');
        bar.style.width = Math.round((v / max) * 100) + '%';
        bar.style.height = '100%';
        barWrap.appendChild(bar);
        div.appendChild(label);
        div.appendChild(barWrap);
        container.appendChild(div);
      });
    }

    loadBtn.addEventListener('click', () => {
      renderAnalytics(shortKeyInput.value);
    });
</script>
</body>
</html>
